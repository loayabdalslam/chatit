<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBase Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .widget-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .widget-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            text-align: center;
        }
        
        .widget-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .message.bot {
            background: #f1f5f9;
            color: #334155;
            align-self: flex-start;
        }
        
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
        }
        
        .input-container {
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        
        .message-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .send-button:hover:not(:disabled) {
            opacity: 0.9;
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin: 8px 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="widget-header">
            <h1 class="widget-title" id="chatbotTitle">ChatBase Assistant</h1>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be added here dynamically -->
        </div>
        
        <div class="input-container">
            <input 
                type="text" 
                class="message-input" 
                id="messageInput" 
                placeholder="Type your message..."
                maxlength="500"
            >
            <button class="send-button" id="sendButton">Send</button>
        </div>
    </div>

    <script>
        class ChatWidget {
            constructor() {
                this.chatbotId = this.getChatbotIdFromUrl();
                this.conversationId = null;
                this.apiBaseUrl = window.location.origin;
                this.isLoading = false;
                
                this.elements = {
                    messages: document.getElementById('chatMessages'),
                    input: document.getElementById('messageInput'),
                    sendButton: document.getElementById('sendButton'),
                    title: document.getElementById('chatbotTitle')
                };
                
                this.init();
            }
            
            getChatbotIdFromUrl() {
                const params = new URLSearchParams(window.location.search);
                return params.get('chatbotId') || 'default';
            }
            
            async init() {
                try {
                    await this.loadChatbotConfig();
                    this.setupEventListeners();
                    this.addWelcomeMessage();
                } catch (error) {
                    console.error('Failed to initialize widget:', error);
                    this.showError('Failed to load chatbot configuration');
                }
            }
            
            async loadChatbotConfig() {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/api/chatbot/${this.chatbotId}`);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const config = await response.json();
                    
                    // Update title
                    if (config.name) {
                        this.elements.title.textContent = config.name;
                    }
                    
                    // Store welcome message
                    this.welcomeMessage = config.welcomeMessage || "Hello! How can I help you today?";
                    
                } catch (error) {
                    console.error('Error loading chatbot config:', error);
                    // Use defaults if config fails to load
                    this.welcomeMessage = "Hello! How can I help you today?";
                }
            }
            
            setupEventListeners() {
                this.elements.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
                
                this.elements.sendButton.addEventListener('click', () => {
                    this.sendMessage();
                });
                
                // Auto-resize widget height for parent iframe
                this.notifyParentOfHeight();
                window.addEventListener('resize', () => this.notifyParentOfHeight());
            }
            
            notifyParentOfHeight() {
                if (window.parent !== window) {
                    const height = document.body.scrollHeight;
                    window.parent.postMessage({ type: 'resize', height }, '*');
                }
            }
            
            addWelcomeMessage() {
                this.addMessage(this.welcomeMessage, 'bot');
            }
            
            addMessage(content, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                messageDiv.textContent = content;
                
                this.elements.messages.appendChild(messageDiv);
                this.elements.messages.scrollTop = this.elements.messages.scrollHeight;
                
                // Notify parent of height change
                setTimeout(() => this.notifyParentOfHeight(), 100);
            }
            
            showError(message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                
                // Remove any existing error messages
                const existingError = document.querySelector('.error-message');
                if (existingError) {
                    existingError.remove();
                }
                
                this.elements.messages.appendChild(errorDiv);
                this.elements.messages.scrollTop = this.elements.messages.scrollHeight;
            }
            
            setLoading(loading) {
                this.isLoading = loading;
                this.elements.sendButton.disabled = loading;
                this.elements.input.disabled = loading;
                
                if (loading) {
                    this.elements.sendButton.innerHTML = '<div class="loading"></div>';
                } else {
                    this.elements.sendButton.textContent = 'Send';
                }
            }
            
            async sendMessage() {
                const message = this.elements.input.value.trim();
                if (!message || this.isLoading) return;
                
                // Add user message to chat
                this.addMessage(message, 'user');
                this.elements.input.value = '';
                
                this.setLoading(true);
                
                try {
                    const response = await fetch(`${this.apiBaseUrl}/api/chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chatbotId: this.chatbotId,
                            message: message,
                            conversationId: this.conversationId
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    
                    // Store conversation ID for future messages
                    if (data.conversationId) {
                        this.conversationId = data.conversationId;
                    }
                    
                    // Add bot response to chat
                    if (data.response) {
                        this.addMessage(data.response, 'bot');
                    } else {
                        this.showError('No response received from chatbot');
                    }
                    
                } catch (error) {
                    console.error('Chat error:', error);
                    this.showError('Failed to send message. Please try again.');
                } finally {
                    this.setLoading(false);
                }
            }
        }
        
        // Initialize widget when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new ChatWidget();
        });
    </script>
</body>
</html>
