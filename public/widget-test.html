<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Test Page</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .widget-info {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            margin: 30px 0;
        }
        .test-button {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Widget Test Page</h1>
        <p>This page demonstrates the chatbot widget functionality.</p>
        
        <div class="widget-info">
            <h3>Widget Information</h3>
            <p>The widget should appear in the bottom-right corner of this page.</p>
            <p>You can interact with it to test the chatbot functionality.</p>
        </div>

        <button class="test-button" onclick="testWidgetMessage()">Send Test Message</button>
        <button class="test-button" onclick="resetWidget()">Reset Widget</button>
    </div>

    <script>
        // Test functions for widget interaction
        function testWidgetMessage() {
            // Try to post a message to the widget if it's loaded in an iframe
            window.postMessage({
                type: 'TEST_MESSAGE',
                message: 'Hello from parent page!'
            }, '*');
        }

        function resetWidget() {
            // Try to reset the widget state
            window.postMessage({
                type: 'RESET_WIDGET'
            }, '*');
        }

        // Listen for messages from the widget
        window.addEventListener('message', (event) => {
            console.log('Received message from widget:', event.data);
            
            if (event.data.type === 'CHATBOT_WIDGET_READY') {
                console.log('Widget is ready with chatbot ID:', event.data.chatbotId);
            }
            
            if (event.data.type === 'CHATBOT_WIDGET_RESIZE') {
                console.log('Widget resized:', event.data);
            }
        });
    </script>
</body>
</html>
